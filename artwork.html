<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artwork — KalaSutra</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="kala-header"></div>
<script>
(function(){
  var G="gallery.html";
  var NAV=[
    {label:"Shop",drop:[
      {label:"All Artworks",href:G},
      {label:"Indian Art",href:G+"?cat=Indian"},
      {label:"Chinese Art",href:G+"?cat=Chinese"},
      {label:"Buddhist Art",href:G+"?cat=Buddhist"},
      {label:"Central Asian Art",href:G+"?cat=Central%20Asian"},
      {label:"Shop by Budget",sub:[{label:"Under ₹ 50,000",href:G},{label:"₹ 50,000 – 1,00,000",href:G},{label:"Above ₹ 1,00,000",href:G}]},
      {label:"Shop by Room",sub:[{label:"Living Room",href:G},{label:"Bedroom",href:G},{label:"Study / Office",href:G},{label:"Entryway",href:G}]},
      {label:"Curated Art Sets",href:G},
      {label:"Gifts & Souvenirs",href:G},
      {label:"Gift Cards",href:"#"}
    ]},
    {label:"Ready to Ship",href:G},
    {label:"Editor's Picks",href:G},
    {label:"Best Selling",href:G},
    {label:"Top Traditions",drop:[
      {label:"Indian Miniatures",href:G+"?cat=Indian"},
      {label:"Pahari Painting",href:G+"?cat=Indian"},
      {label:"Kishangarh School",href:G+"?cat=Indian"},
      {label:"Chinese Scrolls",href:G+"?cat=Chinese"},
      {label:"Song Dynasty",href:G+"?cat=Chinese"},
      {label:"Tibetan Thangka",href:G+"?cat=Buddhist"},
      {label:"Mandala Art",href:G+"?cat=Buddhist"},
      {label:"Bezeklik Murals",href:G+"?cat=Central%20Asian"},
      {label:"More Traditions",href:G}
    ]},
    {label:"Top Artists",drop:[
      {label:"Kishangarh School",href:G+"?cat=Indian"},
      {label:"Kangra School",href:G+"?cat=Indian"},
      {label:"Emperor Huizong",href:G+"?cat=Chinese"},
      {label:"Li Gonglin",href:G+"?cat=Chinese"},
      {label:"Tibetan Thangka Masters",href:G+"?cat=Buddhist"},
      {label:"Bezeklik Workshop",href:G+"?cat=Central%20Asian"},
      {label:"All Artists",href:G}
    ]},
    {label:"Discover Heritage",drop:[
      {label:"Blog",href:"#"},
      {label:"Guides",href:"#"},
      {label:"Learn Indian Art",sub:[{label:"Miniature Painting",href:"#"},{label:"Thangka Tradition",href:"#"},{label:"Chinese Scroll Art",href:"#"}]},
      {label:"News & Events",href:"#"},
      {label:"Artists on KalaSutra",href:G},
      {label:"Try Artworks in Your Room",href:"#"},
      {label:"About Us",href:"#"}
    ]},
    {label:"For Businesses",drop:[
      {label:"Architects & Designers",href:"#"},
      {label:"Corporates & Businesses",href:"#"},
      {label:"Schools & Colleges",href:"#"},
      {label:"Exhibitions",href:"#"}
    ]},
    {label:"Sell Your Art",href:"login.html",cta:true}
  ];
  var here=(location.pathname.split('/').pop()||'index.html');
  function itemHTML(it){
    if(it.sub){
      var subs=it.sub.map(function(s){return '<a href="'+s.href+'">'+s.label+'</a>';}).join('');
      return '<div class="has-sub"><a href="#">'+it.label+'<span class="arr">›</span></a><div class="submenu">'+subs+'</div></div>';
    }
    return '<a href="'+it.href+'">'+it.label+'</a>';
  }
  function tabHTML(t){
    var active=(t.href&&t.href.split('?')[0]===here)?' active':'';
    var cls='tab'+active+(t.cta?' cta':'');
    if(t.drop){
      var menu=t.drop.map(itemHTML).join('');
      return '<div class="'+cls+'"><span>'+t.label+'<span class="caret">▼</span></span><div class="menu">'+menu+'</div></div>';
    }
    return '<div class="'+cls+'"><a href="'+t.href+'">'+t.label+'</a></div>';
  }
  var html=
    '<div class="promo">✨ Free preview · Worldwide shipping · Handpicked heritage art from across Asia</div>'+
    '<header class="site">'+
      '<div class="wrap topbar">'+
        '<a href="index.html" class="brand">Kala<span>Sutra</span></a>'+
        '<div class="searchbar">🔍 <input placeholder="find artworks, traditions, artists & more…"></div>'+
        '<div class="account"><a href="login.html">Sign In</a><a href="#">🛒 Cart (0)</a></div>'+
        '<button class="hamb" aria-label="Menu">☰</button>'+
      '</div>'+
      '<nav class="megabar"><div class="wrap">'+NAV.map(tabHTML).join('')+'</div></nav>'+
    '</header>';
  var mount=document.getElementById('kala-header');
  if(mount){mount.innerHTML=html;}
  var hamb=document.querySelector('.hamb'),bar=document.querySelector('.megabar');
  if(hamb&&bar){hamb.addEventListener('click',function(){bar.classList.toggle('open');});}
})();
</script>

<div class="wrap">
  <div class="detail">
    <img class="art" id="img" alt="">
    <div class="info">
      <span class="tag" id="cat"></span>
      <h1 id="title"></h1>
      <div class="by" id="artist"></div>
      <div class="big-price" id="price"></div>
      <div class="ship">Ships directly from the artist · 5–9 days within India</div>
      <p class="desc" id="desc"></p>
      <a href="#" class="btn primary" style="width:100%;text-align:center" onclick="alert('This is a preview — checkout is not active yet.');return false;">Buy this piece</a>
      <a href="gallery.html" class="btn" style="width:100%;text-align:center;margin-top:12px">Back to gallery</a>
      <div class="specs">
        <div><span>Medium</span><span id="medium"></span></div>
        <div><span>Dimensions</span><span id="size"></span></div>
        <div><span>Year</span><span id="year"></span></div>
        <div><span>Authenticity</span><span>Signed certificate included</span></div>
      </div>
    </div>
  </div>

  <section class="section" style="padding-top:20px">
    <div class="section-head"><h2 style="font-size:26px">More from the gallery</h2></div>
    <div class="grid" id="more"></div>
  </section>
</div>

<footer class="site">
  <div class="wrap foot-grid">
    <div><div class="brand">Kala<span>Sutra</span></div><div>Original art, direct from the maker.</div></div>
    <div><a href="gallery.html">Gallery</a> · <a href="login.html">Artist Login</a></div>
    <div>© 2026 KalaSutra · Preview site</div>
  </div>
</footer>

<script src="art.js"></script>
<script>
  const id = parseInt(new URLSearchParams(location.search).get('id')) || 0;
  const a = ARTWORKS.find(x=>x.id===id) || ARTWORKS[0];
  var imgEl = document.getElementById('img');
  imgEl.onerror = function(){ this.onerror=null; this.src=PLACEHOLDER; };
  imgEl.src = imgURL(a.file);
  document.getElementById('img').alt = a.title;
  document.getElementById('cat').textContent = a.cat;
  document.getElementById('title').textContent = a.title;
  document.getElementById('artist').textContent = "by " + a.artist;
  document.getElementById('price').textContent = a.price;
  document.getElementById('medium').textContent = a.medium;
  document.getElementById('size').textContent = a.size;
  document.getElementById('year').textContent = a.year;
  document.getElementById('desc').textContent = "A considered, one-of-a-kind work by " + a.artist + ". Created with attention to texture, balance and restraint — at home in a calm, light-filled space.";
  renderCards(document.getElementById('more'), ARTWORKS.filter(x=>x.id!==a.id).slice(0,3));
</script>
</body>
</html>
